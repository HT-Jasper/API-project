<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast API</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main></main>
    <div class="container">
        <h1>Weather Forecast API</h1>
        <p>An API that provides weather forecasts for any location in the world.</p>
    </div>

    <div class="container">
        <section class="city">         
            <div class="location">                 
                <h2>Search by City</h2>
                    <label for="cityInput">Enter the city of your interest:</label>
                    <input type="text" id="cityInput" placeholder="Your city name here..." required>
                    <button id="citySearchBtn">Search</button>
                    <ul id="coordinates"></ul>
            </div>
        </section>

        <section class="currentWeather">  
            <div class="CurrentWeather">       
                <h2>Current Weather</h2>
                    <ul id="weatherInfo"></ul>            
            </div>
        </section>

        <section class="forecast">
            <div class="forecast">
                <h2>7-Day Forecast</h2>
                <ul id="forecastInfo"></ul>
            </div>
        </section>
    </div>
            
    </main>

    <script src="script.js"></script>
</body>
</html>
